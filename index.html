<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柯林斯(Collins)高频词 词汇学习</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --surface: #fffdf7;
  --card: #ffffff;
  --accent: #c0392b;
  --accent2: #2471a3;
  --gold: #d4ac0d;
  --text: #1a1a1a;
  --muted: #7f8c8d;
  --border: #ddd5c4;
  --playing: #27ae60;
  --tag-bg: #fef9e7;
  --syn-bg: #f8f9fa;
  --progress-bg: #e8e0d0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* TOP PROGRESS BAR */
#topProgress {
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: var(--progress-bg); z-index: 300; display: none;
}
#topProgressFill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  transition: width 0.4s ease;
  width: 0%;
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 12px 16px;
  position: sticky; top: 0; z-index: 100;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.app-title {
  font-family: "Lora", serif;
  font-size: 1.1rem; font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.02em;
}
.app-title span { color: var(--accent2); }

/* LEVEL TABS */
.level-tabs {
  display: flex; gap: 6px; margin-bottom: 10px;
}
.level-tab {
  flex: 1; padding: 7px 4px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  font-size: 0.8rem; font-weight: 600;
  cursor: pointer; text-align: center;
  transition: all 0.2s; color: var(--muted);
}
.level-tab.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
}
.level-tab.empty {
  opacity: 0.4; cursor: not-allowed;
}

/* GROUP TABS */
.group-scroll {
  display: flex; gap: 5px; overflow-x: auto;
  padding-bottom: 4px; scrollbar-width: none;
}
.group-scroll::-webkit-scrollbar { display: none; }
.group-btn {
  flex-shrink: 0;
  padding: 5px 10px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  font-size: 0.72rem; font-weight: 600;
  cursor: pointer; color: var(--muted);
  transition: all 0.15s;
  white-space: nowrap;
}
.group-btn.active {
  background: var(--accent2); color: #fff;
  border-color: var(--accent2);
}
.group-btn.loaded { color: var(--accent2); border-color: var(--accent2); }

/* CONTROLS */
.controls {
  display: flex; gap: 8px; align-items: center;
}
.search-input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  font-size: 0.9rem; color: var(--text);
  outline: none; font-family: inherit;
}
.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: var(--muted); }

.listen-btn {
  padding: 8px 14px;
  background: var(--accent);
  color: #fff; border: none;
  border-radius: 8px;
  font-size: 0.82rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  font-family: inherit;
  transition: opacity 0.2s;
}
.listen-btn:hover { opacity: 0.88; }
.listen-btn.active { background: #27ae60; }
.mode-btn {
  padding: 8px 12px;
  background: var(--surface);
  color: var(--accent2);
  border: 2px solid var(--accent2);
  border-radius: 8px;
  font-size: 0.78rem; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  font-family: inherit;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}
.mode-btn:hover { background: var(--accent2); color: #fff; }
.mode-btn.mode2 { background: var(--accent2); color: #fff; }

/* NOW PLAYING */
#nowPlaying {
  display: none;
  background: #eafaf1;
  border: 1.5px solid var(--playing);
  border-radius: 10px;
  margin: 10px 16px 8px;
  padding: 10px 14px;
  align-items: center; gap: 10px;
}
#nowPlaying.show { display: flex; }
.pulse-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--playing);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.75); }
}
#nowPlayingWord {
  font-family: "Lora", serif;
  font-size: 1.15rem; font-weight: 600;
  color: var(--playing);
}
#nowPlayingCn {
  font-size: 0.85rem; color: #2e7d51;
}
#nowPlayingCount {
  margin-left: auto; font-size: 0.75rem; color: var(--muted);
}

/* STATS */
.stats-bar {
  padding: 8px 16px 0;
  font-size: 0.75rem; color: var(--muted);
  display: flex; align-items: center; gap: 10px;
}
.stats-bar .gen-status {
  color: var(--accent2); font-weight: 500;
}

/* WORD LIST */
.word-list {
  padding: 10px 16px 100px;
  display: flex; flex-direction: column; gap: 10px;
}

/* WORD CARD */
.word-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.word-card.highlighted {
  border-color: var(--playing);
  box-shadow: 0 0 12px rgba(39,174,96,0.2);
}
.word-card.loading-card {
  opacity: 0.6;
}

/* MAIN WORD ROW */
.main-row {
  display: flex; align-items: flex-start;
  padding: 20px 16px 14px; gap: 10px;
  border-bottom: 1px solid #f0e8d8;
}
.word-num {
  font-size: 0.85rem; color: var(--muted);
  min-width: 32px; text-align: right;
  padding-top: 6px;
}
.main-info { flex: 1; }
/* 主单词+音标竖排 */
.main-word-block {
  display: flex; flex-direction: column; align-items: flex-start;
  margin-bottom: 4px;
}
.main-word {
  font-family: "Lora", serif;
  font-size: clamp(2.2rem, 7vw, 3.2rem); font-weight: 700;
  color: var(--text); display: block;
  line-height: 1.15;
}
.main-word-link {
  color: inherit; text-decoration: none;
}
.main-word-link:hover { color: var(--accent2); text-decoration: underline; }
.main-meta {
  display: flex; align-items: center; gap: 8px;
  margin-top: 2px; flex-wrap: wrap;
}
.pos-tag {
  font-size: 0.9rem; padding: 3px 10px;
  border-radius: 8px;
  background: #fdebd0; color: #a04000;
  border: 1px solid #f0c898;
  font-weight: 600;
}
.main-phonetic {
  font-size: 1.1rem; color: #e67e00;
  font-family: monospace; margin-top: 2px;
  font-weight: 600;
}
.main-meaning {
  font-size: clamp(1.3rem, 4.5vw, 1.9rem); color: var(--accent2);
  font-weight: 600; margin-top: 4px; display: block;
}
.speak-main {
  background: #fef9e7; border: 1.5px solid #f0d060;
  border-radius: 10px; width: 50px; height: 50px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.5rem;
  transition: background 0.15s; flex-shrink: 0;
}
.speak-main:hover { background: #fdf0b0; }
.speak-main.speaking { background: #d5f5e3; border-color: var(--playing); }

/* SYNONYMS */
.syn-wrap {
  padding: 12px 16px 14px;
}
.syn-label {
  font-size: 0.85rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.syn-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  background: var(--syn-bg);
  margin-bottom: 6px;
  border: 1px solid transparent;
  transition: border-color 0.15s;
}
.syn-row:last-child { margin-bottom: 0; }
.syn-row:hover { border-color: #ddd; }
/* 同义词英文+音标竖排 */
.syn-word-block {
  display: flex; flex-direction: column; align-items: flex-start;
  min-width: 120px; flex-shrink: 0;
}
.syn-word {
  font-weight: 700; font-size: clamp(1.3rem, 4vw, 1.8rem);
  color: #1a5276; line-height: 1.2;
}
.syn-phonetic {
  font-size: 1.0rem; color: #e67e00;
  font-family: monospace; margin-top: 1px;
  font-weight: 600;
}
/* 同义词中文含义横向 */
.syn-meaning {
  font-size: clamp(1.2rem, 3.5vw, 1.5rem); color: #222;
  flex: 1; font-weight: 500;
}
.syn-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: auto; }
.speak-syn {
  background: #e8f4fd; border: 1px solid #aed6f1;
  border-radius: 8px; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem;
  transition: background 0.15s;
}
.speak-syn:hover { background: #d6eaf8; }
.speak-syn.speaking { background: #d5f5e3; border-color: var(--playing); }
.eudict-btn {
  background: #fef9e7; border: 1px solid #f0d060;
  border-radius: 8px; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.85rem; color: #8b6914;
  text-decoration: none;
  transition: background 0.15s;
}
.eudict-btn:hover { background: #fdf0b0; }
/* Main word eudict button */
.eudict-main-btn {
  background: #fef9e7; border: 1px solid #f0d060;
  border-radius: 8px; padding: 3px 10px;
  font-size: 1rem; cursor: pointer;
  color: #8b6914; font-family: inherit;
  transition: background 0.15s;
  margin-left: 6px;
}
.eudict-main-btn:hover { background: #fdf0b0; }

/* LOADING PLACEHOLDER */
.loading-placeholder {
  padding: 14px 12px;
  display: flex; align-items: center; gap: 8px;
  color: var(--muted); font-size: 0.85rem;
}
.spin {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent2);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* GENERATE BTN */
.gen-btn {
  display: block; width: calc(100% - 32px);
  margin: 0 16px 12px;
  padding: 12px;
  background: var(--accent2); color: #fff;
  border: none; border-radius: 10px;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: opacity 0.2s;
}
.gen-btn:hover { opacity: 0.88; }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* PATCH BTN */
.patch-btn {
  display: block; width: calc(100% - 32px);
  margin: 0 16px 12px;
  padding: 10px;
  background: #f39c12; color: #fff;
  border: none; border-radius: 10px;
  font-size: 0.88rem; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: opacity 0.2s;
}
.patch-btn:hover { opacity: 0.88; }
.patch-btn:disabled { opacity: 0.5; cursor: not-allowed; }

footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  font-size: 0.7rem; color: var(--muted);
  text-align: center;
}

.search-wrap {
  padding: 8px 16px 4px;
}
.search-wrap.hidden { display: none; }
</style>
</head>

<div id="topProgress"><div id="topProgressFill"></div></div>

<header>

    <div class="app-title">柯林斯 <span>词汇学习</span></div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="listen-btn" id="listenBtn" onclick="toggleListen()">▶ 纯听</button>
      <button class="mode-btn" id="modeBtn" onclick="toggleMode()" title="切换听力模式">英英中</button>
    </div>
  </div>
  <div class="level-tabs">
    <div class="level-tab active" onclick="switchLevel(3)">Level 3</div>
    <div class="level-tab empty" onclick="switchLevel(4)">Level 4</div>
    <div class="level-tab empty" onclick="switchLevel(5)">Level 5</div>
  </div>
  <div class="group-scroll" id="groupScroll"></div>

</header>

<div id="nowPlaying">
  <div class="pulse-dot"></div>
  <div>
    <div id="nowPlayingWord"></div>

</div>

<div class="stats-bar">

  <div style="margin-left:auto;display:flex;gap:6px;">
    <button id="patchAllBtn" onclick="patchAllGroups()" style="padding:4px 10px;background:#f39c12;color:#fff;border:none;border-radius:6px;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:inherit;display:none;">🔧 补全所有空缺</button>
    <button onclick="testAPI()" style="padding:4px 10px;background:#8e44ad;color:#fff;border:none;border-radius:6px;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:inherit;">🔌 测试API</button>
    <button onclick="exportHTML()" style="padding:4px 10px;background:#27ae60;color:#fff;border:none;border-radius:6px;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:inherit;">⬇ 导出完整HTML</button>
  </div>
</div>

<div class="search-wrap" id="searchWrap">
  <input class="search-input" id="searchInput" placeholder="搜索单词…" oninput="onSearch()">
</div>
<div id="wordList" class="word-list"></div>

<footer>柯林斯 Level 3 · 共3038个单词 · 31组</footer>

// ── State ──────────────────────────────────────────────────────────────
const cache = {}; // groupIndex -> array of word objects
let currentLevel = 3;

let listenIndex = 0;

// ── Group Nav ──────────────────────────────────────────────────────────
function buildGroupNav() {
  const scroll = document.getElementById('groupScroll');
  const groups = ALL_WORDS;
  scroll.innerHTML = groups.map((_, i) => `
    <button class="group-btn ${cache[i] ? 'loaded' : ''} ${i===currentGroup ? 'active' : ''}"
      id="gbtn-${i}" onclick="selectGroup(${i})">
      L3-${i+1}
    </button>
  `).join('');
}

function selectGroup(i) {
  currentGroup = i;
  buildGroupNav();
  // scroll active btn into view
  setTimeout(() => {
    const btn = document.getElementById('gbtn-'+i);
    if (btn) btn.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  }, 50);
  renderGroup();
}

// ── Render ─────────────────────────────────────────────────────────────
function renderGroup() {
  const words = ALL_WORDS[currentGroup];
  const offset = currentGroup * 100;
  const data = cache[currentGroup];

  if (searchMode) return;

  document.getElementById('statsLabel').textContent =
    `第 ${currentGroup+1} 组 · ${words.length} 个单词`;

  const list = document.getElementById('wordList');

  if (!data) {
    // Show words as stubs + generate button
    list.innerHTML = `
      <button class="gen-btn" id="genBtn" onclick="generateGroup(${currentGroup})">
        ✨ 生成第 ${currentGroup+1} 组数据（AI自动填写音标+释义+同义词）
      </button>
      ${words.map((w, i) => `
        <div class="word-card loading-card" id="card-${i}">
          <div class="loading-placeholder">
            <span class="word-num">${offset+i+1}</span>
            <strong style="font-family:Lora,serif;font-size:1rem">${w}</strong>
            <span style="color:#bbb;font-size:0.8rem">— 待生成</span>
          </div>
        </div>
      `).join('')}
    `;
  } else {
    // 统计空缺数量
    const missingCount = data.filter(item => isIncomplete(item)).length;
    const patchBar = missingCount > 0 ? `
      <button class="patch-btn" id="patchBtn" onclick="patchGroup(${currentGroup})">
        🔧 发现 ${missingCount} 个空缺词条，点击AI补全
      </button>` : '';
    list.innerHTML = patchBar + data.map((item, i) => renderCard(item, i, offset)).join('');
  }
}

function renderCard(item, i, offset) {
  const w = item.word || '';
  const esc = w.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

  // Synonym rows
  let synHtml = '';
  if (item.synonyms && item.synonyms.length > 0) {
    let rows = '';
    item.synonyms.forEach(function(s) {
      const sw = s.word || '';
      const swEsc = sw.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      rows += '<div class="syn-row">'
        + '<div class="syn-word-block">'
        + '<span class="syn-word">' + sw + '</span>'
        + (s.phonetic ? '<span class="syn-phonetic">' + s.phonetic + '</span>' : '')
        + '</div>'
        + '<span class="syn-meaning">' + (s.meaning||'') + '</span>'
        + '<div class="syn-actions">'
        + '<button class="speak-syn" onclick="speak(\'' + swEsc + '\',this)">🔊</button>'
        + '<a class="eudict-btn eudict-syn" data-word="' + sw.replace(/"/g,'&quot;') + '" href="javascript:void(0)" title="欧路词典">'
        + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">'
        + '<path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>'
        + '<polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>'
        + '</svg></a>'
        + '</div></div>';
    });
    synHtml = '<div class="syn-wrap"><div class="syn-label">常用同义词</div>' + rows + '</div>';
  }

  const num = (offset||0) + i + 1;
  const ph = item.phonetic ? '<span class="main-phonetic">' + item.phonetic + '</span>' : '';
  const pos = item.pos ? '<span class="pos-tag">' + item.pos + '</span>' : '';
  const meaning = item.meaning ? '<span class="main-meaning">' + item.meaning + '</span>' : '';

  return '<div class="word-card" id="card-' + i + '" data-word="' + w.replace(/"/g,'&quot;') + '" data-cn="' + (item.meaning||'').replace(/"/g,'&quot;') + '">'
    + '<div class="main-row">'
    + '<span class="word-num">' + num + '</span>'
    + '<div class="main-info">'
    + '<div class="main-word-block">'
    + '<span class="main-word">' + w + '</span>'
    + ph
    + '</div>'
    + '<div class="main-meta">'
    + pos
    + '<button class="eudict-main-btn" onclick="openEudict(event,\'' + esc + '\')" title="欧路词典">📖</button>'
    + '</div>'
    + meaning
    + '</div>'
    + '<button class="speak-main" onclick="speak(\'' + esc + '\',this)">🔊</button>'
    + '</div>'
    + synHtml
    + '</div>';
}


function isIncomplete(item) {
  if (!item) return true;
  const w = (item.word||'').toLowerCase().trim();
  const m = (item.meaning||'').toLowerCase().trim();
  const ph = (item.phonetic||'').toLowerCase().trim();
  // meaning缺失 or meaning等于单词 or phonetic等于单词（错误照抄）
  if (!m || m === w || ph === w) return true;
  // phonetic不以/开头说明是错误数据
  if (item.phonetic && !item.phonetic.trim().startsWith('/')) return true;
  return false;
}

async function generateGroup(groupIdx) {
  if (isGenerating) return;
  isGenerating = true;

  const btn = document.getElementById('genBtn');
  const patchBtn = document.getElementById('patchBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ AI生成中，请稍候…'; }
  if (patchBtn) { patchBtn.disabled = true; }
  document.getElementById('genStatus').textContent = '正在生成…';

  const words = ALL_WORDS[groupIdx];
  const batchSize = 25;
  const results = [];

  for (let b = 0; b < words.length; b += batchSize) {
    const batch = words.slice(b, b+batchSize);
    const pct = Math.round((b/words.length)*100);
    if (btn) btn.textContent = `⏳ 生成中 ${pct}%…`;
    document.getElementById('genStatus').textContent = `${b+1}-${Math.min(b+batchSize, words.length)} / ${words.length}`;

    try {
      const batchData = await callAI(batch, b);
      results.push(...batchData);

      // Update cards in real time
      batchData.forEach((item, bi) => {
        const idx = b + bi;
        const card = document.getElementById('card-'+idx);
        if (card) card.outerHTML = renderCard(item, idx, groupIdx*100);
      });
    } catch(e) {
      console.error('Batch error:', e);
      batch.forEach((w, bi) => {
        results.push({word:w, pos:'', phonetic:'', meaning:'', synonyms:[]});
      });
    }

    if (b + batchSize < words.length) {
      await new Promise(r => setTimeout(r, 800));
    }
  }

  cache[groupIdx] = results;
  saveCache(groupIdx, results);
  isGenerating = false;
  document.getElementById('genStatus').textContent = '✅ 生成完成';
  document.getElementById('gbtn-'+groupIdx).classList.add('loaded');

  setTimeout(() => {
    document.getElementById('genStatus').textContent = '';
    renderGroup();
  }, 1500);
}

// 补全当前组的空缺条目
async function patchGroup(groupIdx) {
  if (isGenerating) return;
  const existing = cache[groupIdx];
  if (!existing) { generateGroup(groupIdx); return; }

  // 找出空缺索引
  const missing = [];
  existing.forEach((item, i) => {
    if (isIncomplete(item)) missing.push(i);
  });

  if (missing.length === 0) {
    document.getElementById('genStatus').textContent = '✅ 本组无空缺！';
    setTimeout(() => document.getElementById('genStatus').textContent = '', 2000);
    return;
  }

  isGenerating = true;
  const patchBtn = document.getElementById('patchBtn');
  if (patchBtn) { patchBtn.disabled = true; patchBtn.textContent = `⏳ 补全 ${missing.length} 个…`; }
  document.getElementById('genStatus').textContent = `发现 ${missing.length} 个空缺，补全中…`;

  const batchSize = 20;
  for (let b = 0; b < missing.length; b += batchSize) {
    const idxBatch = missing.slice(b, b + batchSize);
    const wordBatch = idxBatch.map(i => existing[i].word);
    document.getElementById('genStatus').textContent = `补全 ${b+1}-${Math.min(b+batchSize, missing.length)} / ${missing.length}`;

    try {
      const batchData = await callAI(wordBatch, 0);
      batchData.forEach((item, bi) => {
        const origIdx = idxBatch[bi];
        existing[origIdx] = item;
        const card = document.getElementById('card-'+origIdx);
        if (card) card.outerHTML = renderCard(item, origIdx, groupIdx*100);
      });
    } catch(e) {
      console.error('Patch error:', e);
    }
    if (b + batchSize < missing.length) {
      await new Promise(r => setTimeout(r, 800));
    }
  }

  cache[groupIdx] = existing;
  saveCache(groupIdx, existing);
  isGenerating = false;
  document.getElementById('genStatus').textContent = '✅ 补全完成';
  if (patchBtn) { patchBtn.disabled = false; patchBtn.textContent = '🔧 补全空缺'; }
  setTimeout(() => document.getElementById('genStatus').textContent = '', 2000);
}

async function callAI(words, offset) {
  const list = words.map((w,i) => `${i+1}. ${w}`).join('\n');
  const prompt = `你是英语词典专家。为以下单词/词组生成学习数据，严格返回JSON数组，不要任何多余文字和代码块标记。

单词列表:
${list}

返回格式（每个单词一个对象，顺序与输入一致）:
[{"word":"abbey","pos":"n.","phonetic":"/ˈæbi/","meaning":"修道院","synonyms":[{"word":"monastery","phonetic":"/ˈmɒnəstri/","meaning":"寺院"},{"word":"convent","phonetic":"/ˈkɒnvənt/","meaning":"女修道院"}]},...]

严格规则:
1. word字段必须与输入单词完全一致（不要修改）
2. phonetic必须是真实IPA音标，用/斜杠/包围，如/ˈæbi/。绝对不能把单词本身写进phonetic字段！
3. meaning写最核心的1个中文义项
4. synonyms按词性匹配同义词（adj→adj，n→n，v→v，adv→adv），每词2-4个
5. 缩写词（如Jan、Feb、Br.、Jr.）、专有名词（如Bible、Easter）：phonetic照常给，synonyms可为[]
6. 复合词/词组（如break down、blood pressure）：按整体词义给phonetic和meaning
7. 直接返回JSON数组，第一个字符必须是[`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      messages: [{role:'user', content: prompt}]
    })
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error('API ' + resp.status + ': ' + errText.slice(0,200));
  }
  const data = await resp.json();
  if (!data.content) throw new Error('API response missing content: ' + JSON.stringify(data).slice(0,200));
  let text = data.content.map(c => c.text||'').join('');
  text = text.trim().replace(/^```json?\s*/,'').replace(/\s*```$/,'');
  const parsed = JSON.parse(text);
  if (!Array.isArray(parsed)) throw new Error('Expected array, got: ' + typeof parsed);
  return parsed;
}

// ── LocalStorage Cache ─────────────────────────────────────────────────
function saveCache(groupIdx, data) {
  try {
    localStorage.setItem(`collins_l3_g${groupIdx}`, JSON.stringify(data));
  } catch(e) {}
}

function loadCache() {
  // Only use localStorage data if it has actual content (meaning fields filled)
  // This prevents old empty localStorage from overwriting PRELOADED_CACHE
  for (let i = 0; i < ALL_WORDS.length; i++) {
    try {
      const raw = localStorage.getItem('collins_l3_g' + i);
      if (!raw) continue;
      const stored = JSON.parse(raw);
      // Count filled entries in stored vs preloaded
      const storedFilled = stored.filter(function(x){ return x && x.meaning && x.meaning !== x.word; }).length;
      const preloadedFilled = cache[i] ? cache[i].filter(function(x){ return x && x.meaning && x.meaning !== x.word; }).length : 0;
      // Only use localStorage if it has MORE filled entries
      if (storedFilled > preloadedFilled) {
        cache[i] = stored;
      }
    } catch(e) {}
  }
}

// ── Speech ─────────────────────────────────────────────────────────────
let listenModeType = 1; // 1=英英中, 2=中英英

function speak(word, btn) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85;
  document.querySelectorAll('.speak-main,.speak-syn').forEach(b=>b.classList.remove('speaking'));
  if (btn) btn.classList.add('speaking');
  u.onend = () => { if(btn) btn.classList.remove('speaking'); };
  window.speechSynthesis.speak(u);
}

function sayEN(text) {
  return new Promise(resolve => {
    if (!listenMode || !window.speechSynthesis) { resolve(); return; }
    const synth = window.speechSynthesis;
    // 安卓息屏恢復後 synth 可能被暫停，先 resume
    if (synth.paused) synth.resume();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.82;
    u.onend = resolve;
    u.onerror = function(e) {
      // 被打斷後重試一次
      if (listenMode) {
        setTimeout(() => {
          if (listenMode) {
            const u2 = new SpeechSynthesisUtterance(text);
            u2.lang = 'en-US'; u2.rate = 0.82;
            u2.onend = resolve; u2.onerror = resolve;
            synth.speak(u2);
          } else resolve();
        }, 300);
      } else resolve();
    };
    synth.speak(u);
  });
}

function sayCN(text) {
  return new Promise(resolve => {
    if (!listenMode || !window.speechSynthesis) { resolve(); return; }
    const synth = window.speechSynthesis;
    if (synth.paused) synth.resume();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.9;
    u.onend = resolve;
    u.onerror = function(e) {
      if (listenMode) {
        setTimeout(() => {
          if (listenMode) {
            const u2 = new SpeechSynthesisUtterance(text);
            u2.lang = 'zh-CN'; u2.rate = 0.9;
            u2.onend = resolve; u2.onerror = resolve;
            synth.speak(u2);
          } else resolve();
        }, 300);
      } else resolve();
    };
    synth.speak(u);
  });
}

// 用 AudioContext 計時，不受安卓息屏影響
function pause(ms) {
  return new Promise(resolve => {
    if (!listenMode) { resolve(); return; }
    // 嘗試用 AudioContext 計時（息屏時仍工作）
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (AudioContext && silentAudio && silentAudio.ctx) {
        const ctx = silentAudio.ctx;
        const startTime = ctx.currentTime;
        const endTime = startTime + ms / 1000;
        // 創建一個靜音buffer在指定時間後結束
        const buf = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * ms / 1000)), ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.onended = () => { if (listenMode) resolve(); };
        src.start();
        return;
      }
    } catch(e) {}
    // 降級：普通 setTimeout
    listenTimeout = setTimeout(resolve, ms);
  });
}

// ── Wake Lock + 息屏恢復播放 ──────────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch(e) {}
  }
  startSilentAudio();  // 同時啟動無聲音頻（雙重保障）
}

function releaseWakeLock() {
  if (wakeLock) { try { wakeLock.release(); } catch(e) {} wakeLock = null; }
  stopSilentAudio();
}

// ── 無聲音頻：安卓息屏時保持音頻上下文活躍 ──
let silentAudio = null;
function startSilentAudio() {
  stopSilentAudio();
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    // 用振盪器產生極低音量持續音頻
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    gain.gain.value = 0.001;
    osc.frequency.value = 1;  // 1Hz，人耳聽不到
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    silentAudio = { ctx, osc, gain };
    // 安卓: AudioContext有時會被suspend，定期resume
    silentAudio.keepAlive = setInterval(() => {
      if (silentAudio && silentAudio.ctx.state === 'suspended') {
        silentAudio.ctx.resume();
      }
    }, 2000);
  } catch(e) {}
}
function stopSilentAudio() {
  if (silentAudio) {
    try {
      clearInterval(silentAudio.keepAlive);
      silentAudio.osc.stop();
      silentAudio.ctx.close();
    } catch(e) {}
    silentAudio = null;
  }
}

// ── 息屏/切換前台後恢復播放 ──────────────────────────────────────────
let listenResumeTimer = null;
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && listenMode) {
    // 重新申請 wake lock
    if (!wakeLock) { await requestWakeLock(); }

    // iOS Safari息屏後speechSynthesis會被暫停或取消
    // 延遲300ms後檢查，如果沒在說話就強制繼續
    clearTimeout(listenResumeTimer);
    listenResumeTimer = setTimeout(() => {
      if (!listenMode) return;
      const synth = window.speechSynthesis;
      if (!synth) return;
      // 如果合成器卡住（paused但沒有pending），強制resume
      if (synth.paused) {
        synth.resume();
      }
      // 如果完全停了（不在說話、不在等），重新觸發playNext
      if (!synth.speaking && !synth.pending) {
        // 取消任何殘留狀態
        synth.cancel();
        setTimeout(() => {
          if (listenMode) playNext();
        }, 200);
      }
    }, 300);
  }
});

// ── iOS Safari 特有修復：定期檢查播放狀態 ──────────────────────────
let listenHealthTimer = null;
function startListenHealthCheck() {
  stopListenHealthCheck();
  listenHealthTimer = setInterval(() => {
    if (!listenMode) { stopListenHealthCheck(); return; }
    const synth = window.speechSynthesis;
    if (!synth) return;
    // iOS有時會靜默卡住：paused=false, speaking=false, pending=false
    // 用一個計數器追蹤：如果連續5秒都沒有說話就重啟
    if (!synth.speaking && !synth.pending && !synth.paused) {
      if (!window._listenStuckCount) window._listenStuckCount = 0;
      window._listenStuckCount++;
      if (window._listenStuckCount >= 5) {
        window._listenStuckCount = 0;
        synth.cancel();
        setTimeout(() => { if (listenMode) playNext(); }, 200);
      }
    } else {
      window._listenStuckCount = 0;
    }
  }, 1000);
}
function stopListenHealthCheck() {
  if (listenHealthTimer) { clearInterval(listenHealthTimer); listenHealthTimer = null; }
  window._listenStuckCount = 0;
}


function toggleListen() {
  listenMode ? stopListen() : startListen();
}

function toggleMode() {
  if (listenMode) return; // don't switch while playing
  listenModeType = listenModeType === 1 ? 2 : 1;
  const btn = document.getElementById('modeBtn');
  btn.textContent = listenModeType === 1 ? '英英中' : '中英英';
  btn.classList.toggle('mode2', listenModeType === 2);
}

function getListenList() {
  const grp = cache[currentGroup];
  if (grp) return grp;
  return ALL_WORDS[currentGroup].map(w => ({word:w, meaning:'', synonyms:[]}));
}

function highlightAndScroll(item) {
  return new Promise(resolve => {
    document.querySelectorAll('.word-card').forEach(c=>c.classList.remove('highlighted'));
    const card = document.querySelector(`[data-word="${item.word}"]`);
    if (card) {
      card.classList.add('highlighted');
      card.scrollIntoView({behavior:'smooth', block:'center'});
      setTimeout(resolve, 500); // wait for scroll to settle
    } else {
      resolve();
    }
  });
}

function showWordHidden(item) {
  // Mode 2: hide english word text on card temporarily
  const card = document.querySelector(`[data-word="${item.word}"]`);
  if (!card) return;
  const mainWord = card.querySelector('.main-word');
  const phonetic = card.querySelector('.main-phonetic');
  if (mainWord) mainWord.style.color = 'transparent';
  if (phonetic) phonetic.style.opacity = '0';
}

function showWordReveal(item) {
  const card = document.querySelector(`[data-word="${item.word}"]`);
  if (!card) return;
  const mainWord = card.querySelector('.main-word');
  const phonetic = card.querySelector('.main-phonetic');
  if (mainWord) mainWord.style.color = '';
  if (phonetic) phonetic.style.opacity = '';
}

function startListen() {
  listenMode = true; listenIndex = 0;
  const btn = document.getElementById('listenBtn');
  btn.textContent = '■ 停止'; btn.classList.add('active');
  document.getElementById('topProgress').style.display = 'block';
  document.getElementById('nowPlaying').classList.add('show');
  // 隱藏搜索框，避免遮擋第一個單詞
  const sw = document.getElementById('searchWrap');
  if (sw) sw.classList.add('hidden');
  requestWakeLock();
  startListenHealthCheck();
  playNext();
}

function stopListen() {
  listenMode = false;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  clearTimeout(listenTimeout);
  releaseWakeLock();
  stopListenHealthCheck();
  clearTimeout(listenResumeTimer);
  // 恢復搜索框
  const sw = document.getElementById('searchWrap');
  if (sw) sw.classList.remove('hidden');
  const btn = document.getElementById('listenBtn');
  btn.textContent = '▶ 纯听'; btn.classList.remove('active');
  document.getElementById('topProgress').style.display = 'none';
  document.getElementById('nowPlaying').classList.remove('show');
  document.querySelectorAll('.word-card').forEach(c=>{
    c.classList.remove('highlighted');
    const mw = c.querySelector('.main-word');
    const ph = c.querySelector('.main-phonetic');
    if (mw) mw.style.color = '';
    if (ph) ph.style.opacity = '';
  });
}

async function playNext() {
  if (!listenMode) return;
  const list = getListenList();
  if (listenIndex >= list.length) { stopListen(); return; }

  const item = list[listenIndex];
  const pct = ((listenIndex / list.length)*100).toFixed(1);
  document.getElementById('topProgressFill').style.width = pct+'%';
  document.getElementById('nowPlayingWord').textContent = item.word;
  document.getElementById('nowPlayingCn').textContent = item.meaning || '';
  document.getElementById('nowPlayingCount').textContent = `${listenIndex+1} / ${list.length}`;

  if (listenModeType === 1) {
    // 模式1「英英中」: 滚动到单词 → 英文×2(间隔0.5s) → 停4s → 中文 → 停4s → 下一个
    await highlightAndScroll(item);
    if (!listenMode) return;
    await sayEN(item.word);
    if (!listenMode) return;
    await pause(500);
    if (!listenMode) return;
    await sayEN(item.word);
    if (!listenMode) return;
    await pause(4000);  // 英-中之间4秒间隔
    if (!listenMode) return;
    if (item.meaning) {
      await sayCN(item.meaning);
    }
    if (!listenMode) return;
    await pause(4000);
  } else {
    // 模式2「中英英」: 滚动到单词(隐藏英文) → 读中文 → 停4s → 显示英文 → 英文×2(间隔0.5s) → 停1s → 下一个
    await highlightAndScroll(item);
    if (!listenMode) return;
    showWordHidden(item);
    if (item.meaning) {
      await sayCN(item.meaning);
    }
    if (!listenMode) return;
    await pause(4000);
    if (!listenMode) return;
    showWordReveal(item);
    await sayEN(item.word);
    if (!listenMode) return;
    await pause(500);
    if (!listenMode) return;
    await sayEN(item.word);
    if (!listenMode) return;
    await pause(1000);
  }

  listenIndex++;
  playNext();
}

function exportHTML() {
  const done = Object.keys(cache).length;
  if (done === 0) {
    alert('还没有生成任何数据！请先点击各组的"✨ 生成"按钮。');
    return;
  }

  const jsonStr = JSON.stringify(cache);

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(jsonStr).then(() => {
      alert(`✅ 数据已复制！\n\n已生成 ${done} 组数据。\n请粘贴发给Claude，Claude会帮你生成完整HTML文件。`);
    }).catch(() => {
      showCopyBox(jsonStr);
    });
  } else {
    showCopyBox(jsonStr);
  }
}

// ── Patch All Groups ───────────────────────────────────────────────────
let patchAllQueue = [];
let patchAllRunning = false;

function countAllIncomplete() {
  let total = 0;
  for (let g = 0; g < ALL_WORDS.length; g++) {
    if (!cache[g]) continue;
    cache[g].forEach(item => { if (isIncomplete(item)) total++; });
  }
  return total;
}

function updatePatchAllBtn() {
  const n = countAllIncomplete();
  const btn = document.getElementById('patchAllBtn');
  if (!btn) return;
  if (n > 0) {
    btn.style.display = '';
    btn.textContent = `🔧 补全所有空缺 (${n}个)`;
  } else {
    btn.style.display = 'none';
  }
}

async function patchAllGroups() {
  if (patchAllRunning) return;
  patchAllRunning = true;
  const btn = document.getElementById('patchAllBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 补全中…'; }

  for (let g = 0; g < ALL_WORDS.length; g++) {
    if (!cache[g]) continue;
    const missing = [];
    cache[g].forEach((item, i) => { if (isIncomplete(item)) missing.push(i); });
    if (missing.length === 0) continue;

    document.getElementById('genStatus').textContent =
      `补全第${g+1}组 (${missing.length}个空缺)…`;

    // Batch by 20
    for (let b = 0; b < missing.length; b += 20) {
      const idxBatch = missing.slice(b, b+20);
      const wordBatch = idxBatch.map(i => cache[g][i].word);
      try {
        const batchData = await callAI(wordBatch, 0);
        batchData.forEach((item, bi) => {
          const origIdx = idxBatch[bi];
          cache[g][origIdx] = item;
          // Update card if currently visible
          if (currentGroup === g) {
            const card = document.getElementById('card-'+origIdx);
            if (card) card.outerHTML = renderCard(item, origIdx, g*100);
          }
        });
      } catch(e) {
        console.error('patchAll batch error:', e);
        // Show error in UI so user knows something failed
        document.getElementById('genStatus').textContent = '⚠️ 批次错误: ' + (e.message||e) + ' — 继续下一批…';
        await new Promise(r => setTimeout(r, 1500));
      }
      await new Promise(r => setTimeout(r, 600));
    }
    saveCache(g, cache[g]);
    document.getElementById('gbtn-'+g).classList.add('loaded');
  }

  patchAllRunning = false;
  if (btn) { btn.disabled = false; }
  updatePatchAllBtn();
  const remaining = countAllIncomplete();
  if (remaining === 0) {
    document.getElementById('genStatus').textContent = '✅ 全部 909 个空缺补全完成！请点击导出保存。';
  } else {
    document.getElementById('genStatus').textContent = '⚠️ 完成，仍剩 ' + remaining + ' 个未补全（可再次点击重试）';
  }
  renderGroup();
}

async function testAPI() {
  document.getElementById('genStatus').textContent = '🔍 测试API中…';
  try {
    const data = await callAI(['abbey'], 0);
    document.getElementById('genStatus').textContent = '✅ API正常！abbey → ' + (data[0]&&data[0].meaning||'无结果');
  } catch(e) {
    document.getElementById('genStatus').textContent = '❌ API错误: ' + e.message;
  }
}

// ── Eudict link helper ─────────────────────────────────────────────────
function openEudict(e, word) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const url = 'eudic://dict/' + encodeURIComponent(word);
  window.location.href = url;
  // fallback via iframe
  setTimeout(function() {
    var f = document.createElement('iframe');
    f.style.display = 'none';
    f.src = url;
    document.body.appendChild(f);
    setTimeout(function(){ f.remove(); }, 1000);
  }, 50);
}

// Event delegation for eudict links (handles data-word attribute)
document.addEventListener('click', function(e) {
  const el = e.target.closest('.eudict-main, .eudict-syn, .eudict-btn');
  if (!el) return;
  e.preventDefault();
  e.stopPropagation();
  const word = el.getAttribute('data-word') || '';
  if (word) {
    const url = 'eudic://dict/' + encodeURIComponent(word);
    // Try window.location first (works on most platforms)
    window.location.href = url;
    // Also try opening via a link click (fallback for some browsers)
    setTimeout(function() {
      const a = document.createElement('a');
      a.href = url;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => a.remove(), 500);
    }, 50);
  }
});

if (typeof PRELOADED_CACHE !== 'undefined') { Object.assign(cache, PRELOADED_CACHE); }
  loadCache();
buildGroupNav();
selectGroup(0);
// Show patch button if there are incomplete entries
setTimeout(updatePatchAllBtn, 500);
